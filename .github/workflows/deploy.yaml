name: Build and Deploy to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------
      # 1. Check out the code
      # --------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. Configure AWS credentials
      # --------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # --------------------------------------------------
      # 3. Log in to Amazon ECR
      # --------------------------------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --------------------------------------------------
      # 4. Build the Docker image and push to ECR
      # --------------------------------------------------
      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FULL_IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "Building $FULL_IMAGE"
          docker build -t $FULL_IMAGE .
          docker push $FULL_IMAGE
          echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT

      # --------------------------------------------------
      # 5. Configure kubectl for EKS
      # --------------------------------------------------
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name $EKS_CLUSTER_NAME \
            --region $AWS_REGION

      # --------------------------------------------------
      # 6. Deploy to EKS
      # --------------------------------------------------
      - name: Deploy to EKS
        env:
          FULL_IMAGE: ${{ steps.build-image.outputs.image }}
        run: |
          # Replace the image placeholder with the real image URI
          sed -i "s|IMAGE_PLACEHOLDER|$FULL_IMAGE|g" k8s/deployment.yaml

          echo "--- Deploying with image: $FULL_IMAGE ---"
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

          # Wait for the rollout to finish
          kubectl rollout status deployment/cicd-app --timeout=120s

          echo "--- Deployment complete! ---"
          kubectl get pods -l app=cicd-app
          kubectl get svc cicd-app